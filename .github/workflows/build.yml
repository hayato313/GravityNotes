name: Build and Release DirectX Game

on:
  workflow_dispatch:

env:
  VERSION_FILE: .github/version.txt

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Version
      id: version
      shell: powershell
      run: |
        if (Test-Path "${{ env.VERSION_FILE }}") {
          $version = (Get-Content "${{ env.VERSION_FILE }}" -Raw).Trim()
        } else {
          $version = "1"
        }
        
        # Zipの名前 $version は変数
        $archiveName = "DIRECTX_BUILD_v$version.zip"

        Write-Output "number=$version" >> $env:GITHUB_OUTPUT
        Write-Output "archive_name=$archiveName" >> $env:GITHUB_OUTPUT

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Clean
      run: msbuild "DirectX_Framework.sln" /t:Clean /p:Configuration="Release" /p:Platform="x64"

    - name: Build with MSBuild
      run: msbuild "DirectX_Framework.sln" /p:Configuration="Release" /p:Platform="x64" /m /v:minimal

    - name: Collect files
      shell: powershell
      run: |
        # releaseという名前の新しいフォルダを作る
        New-Item -ItemType Directory -Path "release" -Force | Out-Null
        
        # リリースに含めたいファイルをここに書く
        Copy-Item -Path "x64/Release/*.exe" -Destination "release" -Force
        
        # shaderフォルダ内の.csoのみをrelease/shaderフォルダ内にコピー
        New-Item -ItemType Directory -Path "release/shader" -Force | Out-Null
        if (Test-Path "shader/*.cso") {
            Copy-Item -Path "shader/*.cso" -Destination "release/shader" -Force
        }

        Copy-Item -Path "x64/Release/*.dll" -Destination "release" -Force 
        Copy-Item -Path "assimp-vc143-mt.dll" -Destination "release" -Force 
        Copy-Item -Path "asset" -Destination "release" -Recurse -Force
        
        # zipを作成
        Compress-Archive -Path "release/*" -DestinationPath "${{ steps.version.outputs.archive_name }}" -Force

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.version.outputs.archive_name }}
        generate_release_notes: true
        tag_name: v${{ steps.version.outputs.number }}
        name: v${{ steps.version.outputs.number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Version
      shell: powershell
      run: |
        $version = [int]"${{ steps.version.outputs.number }}" + 1
        New-Item -ItemType Directory -Path ".github" -Force | Out-Null
        Set-Content -Path "${{ env.VERSION_FILE }}" -Value $version

    - name: Push Version Update
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add .github/version.txt
        git commit -m "bump version to v${{ steps.version.outputs.number }}"
        git push
